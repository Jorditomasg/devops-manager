name: Build and Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Compile with Nuitka
        run: |
          uv run python -m nuitka --standalone --follow-imports `
            --enable-plugin=tk-inter `
            --include-package=customtkinter,darkdetect,pystray,PIL,git,yaml `
            --include-package-data=customtkinter `
            --include-data-dir=config=config `
            --include-data-dir=assets=assets `
            --windows-console-mode=hide `
            --windows-icon-from-ico=assets\icons\icon_red.ico `
            --output-dir=dist `
            --output-filename=devops-manager `
            --assume-yes-for-downloads `
            main.py
        shell: pwsh

      - name: Package for signing
        shell: pwsh
        run: |
          Compress-Archive -Path dist\main.dist\devops-manager.exe `
            -DestinationPath dist\devops-manager-unsigned.zip

      - name: Upload unsigned artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: devops-manager-unsigned
          path: dist\devops-manager-unsigned.zip

  sign:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Sign with SignPath
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: '566b6bce-16ea-4c67-80a2-1654b3efdef4'
          project-slug: 'devops-manager'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe'
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed/

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-manager-signed
          path: signed/devops-manager.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: signed/devops-manager.exe
