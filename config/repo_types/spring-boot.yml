# Spring Boot Repository Definition
type: "spring-boot"
priority: 60
icon: "🍃"
color: "#22c55e"

detection:
  required_files:
    - "pom.xml"
  exclude_files: []

heuristics:
  must_have_directories:
    - "src/main/resources"
  must_match_patterns:
    - "application*.yml"
    - "application*.yaml"
    - "application*.properties"

commands:
  install_cmd: "mvn clean install -DskipTests -B"
  start_cmd: "mvn spring-boot:run"
  windows_start_cmd: "mvnw.cmd spring-boot:run"
  unix_start_cmd: "./mvnw spring-boot:run"
  profile_flag: "-Dspring-boot.run.profiles="

env_files:
  patterns:
    - "application*.yml"
    - "application*.yaml"
    - "application*.properties"
  exclude_dirs:
    - "node_modules"
    - ".git"
    - "target"

ui:
  selectors:
    - label: "App:"
  install:
    label_missing: "Install"
    label_ok: "Reinstall ✓"
    tooltip: "mvn verify // mvn install -DskipTests --batch-mode"

features:
  - "java_version"
  - "database_selector"
