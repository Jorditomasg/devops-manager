# Spring Boot Repository Definition
type: "spring-boot"
priority: 60

detection:
  required_files:
    - "pom.xml"
  exclude_files: []

heuristics:
  must_have_directories:
    - "src/main/resources"
  must_match_patterns:
    - "application*.yml"
    - "application*.yaml"
    - "application*.properties"

commands:
  install_cmd: "mvn clean install -DskipTests -B"
  start_cmd: "mvn spring-boot:run"
  windows_start_cmd: "mvnw.cmd spring-boot:run"
  unix_start_cmd: "./mvnw spring-boot:run"
  profile_flag: "-Dspring-boot.run.profiles="
  ready_pattern: "Started \\w+ in"
  error_pattern: "Application run failed"

env_files:
  default_dir: "src/main/resources"
  config_writer_type: "spring"
  pull_ignore_patterns:
    - "application*.yml"
    - "application*.yaml"
    - "application*.properties"
  main_config_filename: "application.yml"
  patterns:
    - "application*.yml"
    - "application*.yaml"
    - "application*.properties"
  exclude_dirs:
    - "node_modules"
    - ".git"
    - "target"

ui:
  icon: "🍃"
  color: "#22c55e"
  selectors:
    - label: "App:"
  install:
    check_dirs: ["target"]
    label_missing: "Install"
    label_ok: "Reinstall ✓"
    tooltip: "mvn verify // mvn install -DskipTests --batch-mode"
    status_label_deps_missing: "⚠ Falta instalar"

features:
  - "java_version"
