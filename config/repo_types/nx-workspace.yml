# Nx Monorepo Repository Definition
type: "nx-workspace"
priority: 50

detection:
  required_files:
    - "package.json"
    - "nx.json"

commands:
  install_cmd: "npm i"
  reinstall_cmd: "rmdir /s /q node_modules & npm i"
  # This uses a variable `{main_app}` that will be resolved by the python script reading the 'apps' folder
  start_cmd: "npx nx serve {main_app}"
  profile_flag: "--configuration="
  ready_pattern: "compiled successfully|Listening on|localhost:\\d+"
  error_pattern: "Error:"

env_files:
  default_dir: "apps/default/src/environments"
  config_writer_type: "angular"
  pull_ignore_patterns:
    - "environment*.ts"
    - ".env*"
  main_config_filename: "environment.ts"
  patterns:
    - "environment*.ts"
    - ".env"
    - ".env.*"
  exclude_dirs:
    - "node_modules"
    - ".git"
    - "dist"

ui:
  icon: "🅰"
  color: "#ef4444"
  selectors:
    - label: "Env:"
  install:
    check_dirs: ["node_modules"]
    label_missing: "Install"
    label_ok: "Reinstall ✓"
    tooltip: "npm i // npm install --yes --legacy-peer-deps"
    status_label_deps_missing: "⚠ Falta instalar"
