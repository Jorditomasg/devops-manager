# React Repository Definition (Example of scalability without code changes)
type: "react"

detection:
  required_files:
    - "package.json"
  exclude_files:
    - "angular.json"
    - "nx.json"
    
# We can use heuristics to further identify React vs generic Node
heuristics:
  must_match_package_json:
    - "react"
    - "react-dom"

commands:
  install_cmd: "npm ci"
  reinstall_cmd: "rmdir /s /q node_modules & npm i"
  start_cmd: "npm start"
  profile_flag: ""
  ready_pattern: "compiled successfully|Compiled|localhost:\\d+"
  error_pattern: "Failed to compile"

env_files:
  default_dir: "."
  config_writer_type: "raw"
  pull_ignore_patterns:
    - ".env*"
  main_config_filename: ".env"
  patterns:
    - ".env*"
  exclude_dirs:
    - "node_modules"
    - ".git"

ui:
  icon: "⚛\ufe0f"
  color: "#61dafb"
  selectors:
    - label: "Env:"
  install:
    check_dirs: ["node_modules"]
    label_missing: "Install"
    label_ok: "Reinstall ✓"
    tooltip: "npm install"
    status_label_deps_missing: "⚠ Falta instalar"
