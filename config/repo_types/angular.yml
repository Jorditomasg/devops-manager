# Angular Repository Definition
type: "angular"
priority: 40

detection:
  required_files:
    - "package.json"
    - "angular.json"

commands:
  install_cmd: "npm i"
  reinstall_cmd: "rmdir /s /q node_modules & npm i"
  start_cmd: "npx ng serve"
  profile_flag: "--configuration="
  ready_pattern: "compiled successfully|build at"
  error_pattern: "Error:"

env_files:
  default_dir: "src/environments"
  config_writer_type: "angular"
  pull_ignore_patterns:
    - "environment*.ts"
  main_config_filename: "environment.ts"
  patterns:
    - "environment*.ts"
  exclude_dirs:
    - "node_modules"
    - ".git"

ui:
  icon: "🅰"
  color: "#ef4444"
  selectors:
    - label: "Env:"
  install:
    check_dirs: ["node_modules"]
    label_missing: "Install"
    label_ok: "Reinstall ✓"
    tooltip: "npm install --yes --legacy-peer-deps"
    status_label_deps_missing: "⚠ Falta instalar"
