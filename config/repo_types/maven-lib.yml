# Maven Library Repository Definition
type: "maven-lib"
priority: 20

detection:
  required_files:
    - "pom.xml"
  exclude_files: []

heuristics:
  must_have_directories:
    - "src"
  must_not_have_directories:
    - "src/main/resources"

commands:
  install_cmd: "mvn clean install -DskipTests -B"
  start_cmd: "mvn clean install -DskipTests -B"
  windows_start_cmd: "mvnw.cmd clean install -DskipTests -B"
  unix_start_cmd: "./mvnw clean install -DskipTests -B"
  profile_flag: ""
  ready_pattern: "BUILD SUCCESS"
  error_pattern: "BUILD FAILURE"

env_files:
  default_dir: "src/main/resources"
  config_writer_type: "spring"
  pull_ignore_patterns: []
  main_config_filename: ""
  patterns: []
  exclude_dirs: []

ui:
  icon: "📦"
  color: "#f97316"
  install:
    check_dirs: ["target"]
    label_missing: "Install"
    label_ok: "Reinstall ✓"
    tooltip: "mvn verify // mvn install -DskipTests --batch-mode"
    status_label_deps_missing: "⚠ Falta instalar"

features:
  - "java_version"
