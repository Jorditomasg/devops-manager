# config/ui_theme.yml
# ──────────────────────────────────────────────────────────────────────────────
# DevOps Manager – UI Theme Configuration
# Edita este fichero para personalizar el aspecto visual sin tocar código Python.
# Todos los colores son strings hexadecimales. Los tamaños son enteros (px / pt).
# ──────────────────────────────────────────────────────────────────────────────

# ── Tipografía ────────────────────────────────────────────────────────────────
fonts:
  family: "Segoe UI"
  mono: "Consolas"
  sizes:
    xs:   9
    sm:   10
    md:   11
    base: 12
    lg:   13
    xl:   14
    xxl:  15
    h2:   16
    h1:   22

# ── Geometría ─────────────────────────────────────────────────────────────────
geometry:
  corner_btn:       6    # Radio de esquinas de botones y entradas
  corner_card:      10   # Radio de esquinas de tarjetas principales
  corner_panel:     8    # Radio de esquinas de paneles expandidos
  corner_badge:     4    # Radio de badges inline pequeños
  corner_combo:     6    # Radio de ComboBox
  corner_tooltip:   6    # Radio exterior del tooltip
  border_width:     1    # Ancho de borde estándar
  btn_height_sm:    24   # Altura botones pequeños (acciones de log)
  btn_height_md:    28   # Altura botones estándar
  btn_height_lg:    34   # Altura botones topbar / perfil
  topbar_height:    56   # Altura de la barra superior
  checkbox_size:    18   # Ancho/alto checkbox estándar
  checkbox_size_sm: 16   # Ancho/alto checkbox pequeño (select-all)
  checkbox_corner:  4    # Radio de esquinas de checkbox

# ── Fondos ────────────────────────────────────────────────────────────────────
backgrounds:
  app:          "#0f0e26"   # Ventana raíz / topbar / log textbox
  card:         "#16132e"   # Tarjeta colapsada
  card_hover:   "#1c1940"   # Tarjeta al pasar el ratón
  expand_panel: "#120f28"   # Cuerpo del acordeón expandido
  section:      "#1e1b4b"   # Entradas, combos, frames de settings
  section_alt:  "#0f172a"   # Fondos de listas en diálogos
  divider:      "#312e81"   # Línea separadora de 1px

# ── Bordes ────────────────────────────────────────────────────────────────────
borders:
  card:     "#3b3768"   # Tarjeta / log textbox
  default:  "#4338ca"   # Combos, entradas, botones de búsqueda
  settings: "#312e81"   # Frame de sección en settings
  subtle:   "#334155"   # Docker btn parado / listas neutrales

# ── Texto ─────────────────────────────────────────────────────────────────────
text:
  primary:       "#e0e7ff"   # Contenido principal, texto de log, nombres
  secondary:     "#c7d2fe"   # Labels de sección, cabecera de log
  muted:         "#94a3b8"   # Texto de estado, checkboxes secundarios
  faint:         "#6b7280"   # Branch hint, etiquetas atenuadas
  placeholder:   "#888888"   # Placeholder / hint misceláneo
  accent:        "#6366f1"   # Statusbar, etiquetas de puerto
  accent_bright: "#818cf8"   # Flecha expand/collapse
  warning_badge: "#facc15"   # Badge de cambios sin guardar
  white:         "#ffffff"   # Texto de badge, botones sobre fondo oscuro
  # Colores para botones de selector de fichero (modo claro/oscuro)
  file_btn_light: "#333333"
  file_btn_dark:  "#dddddd"
  file_btn_hover_light: "#E3F2FD"
  file_btn_hover_dark:  "#1a2332"

# ── Status de servicios ───────────────────────────────────────────────────────
status:
  running: "#22c55e"   # Verde – servicio corriendo
  starting: "#eab308"  # Amarillo – servicio iniciando
  stopped:  "#6b7280"  # Gris – servicio parado
  error:    "#ef4444"  # Rojo – error
  logging:  "#f97316"  # Naranja – streaming de log activo

# ── Variantes de botón ────────────────────────────────────────────────────────
# Cada variante: fg (fondo), hover (fondo al pasar ratón), border (borde)
buttons:
  # Acciones positivas / guardar / aplicar
  success:
    fg:     "#064e3b"
    hover:  "#047857"
    border: "#10b981"

  # Iniciar servicio
  start:
    fg:     "#144d28"
    hover:  "#16a34a"
    border: "#22c55e"

  # Acción destructiva principal (parar servicio)
  danger:
    fg:     "#4c1616"
    hover:  "#dc2626"
    border: "#ef4444"

  # Acción destructiva secundaria (quick-save sin guardar / instalación fallida)
  danger_alt:
    fg:     "#7f1d1d"
    hover:  "#991b1b"
    border: "#b91c1c"

  # Acción destructiva profunda (borrar perfil en lista)
  danger_deep:
    fg:     "#450a0a"
    hover:  "#dc2626"
    border: "#ef4444"

  # Advertencia / recarga / exportar
  warning:
    fg:     "#4a3310"
    hover:  "#d97706"
    border: "#f59e0b"

  # Acción primaria azul (pull, clonar, browse)
  blue:
    fg:     "#172554"
    hover:  "#2563eb"
    border: "#3b82f6"

  # Azul activo (pull cuando hay commits por detrás)
  blue_active:
    fg:     "#1d4ed8"
    hover:  "#2563eb"
    border: "#3b82f6"

  # Neutro / cancelar / configuración
  neutral:
    fg:     "#1e293b"
    hover:  "#475569"
    border: "#64748b"

  # Neutro alternativo (instalado / archivo)
  neutral_alt:
    fg:     "#334155"
    hover:  "#475569"
    border: "#64748b"

  # Acción de seed / importar (morado suave)
  purple:
    fg:     "#2e1065"
    hover:  "#6d28d9"
    border: "#7c3aed"

  # Clean repo / docker compose (morado alternativo)
  purple_alt:
    fg:     "#4c1d95"
    hover:  "#6d28d9"
    border: "#7c3aed"

  # Panel global: apply-db / seed-all (morado brillante)
  purple_global:
    fg:     "#2e1065"
    hover:  "#9333ea"
    border: "#a855f7"

  # Botones de acción de log (limpiar / desacoplar)
  log_action:
    fg:     "#1e1b4b"
    hover:  "#312e81"
    border: "#4338ca"

  # Chevron expand/collapse de tarjeta
  toggle_expand:
    fg:     "transparent"
    hover:  "#312e81"
    border: "#4338ca"

  # Acento del combo de perfil
  profile_accent:
    fg:     "#7c3aed"
    hover:  "#6d28d9"
    border: "#7c3aed"

# ── Docker Compose ────────────────────────────────────────────────────────────
docker:
  btn_stopped_fg:  "#1e293b"   # Fondo del botón cuando está parado
  btn_active_fg:   "#0f172a"   # Fondo del botón cuando está activo
  border_running:  "#10b981"   # Borde: algún contenedor corriendo
  border_active:   "#3b82f6"   # Borde: perfil activo pero 0 corriendo
  border_stopped:  "#334155"   # Borde: completamente parado

# ── Tooltip ───────────────────────────────────────────────────────────────────
tooltip:
  bg_dark:     "#2a2a3e"
  text_dark:   "#e0e0e0"
  border_dark: "#444466"
  bg_light:    "#333344"
  text_light:  "#f5f5f5"
  border_light: "#555577"
  delay_ms:    500
  wrap_px:     250
